<meta charset="utf-8">
<title>Learn jj — an interactive Jujutsu tutorial</title>
<style>
/* learn-jj — dark, terminal-first. Palette loosely based on Tokyo Night. */
:root {
  --bg: #0d1017;
  --panel: #131722;
  --panel2: #171c2a;
  --border: #262d40;
  --text: #d5dae6;
  --dim: #6b7394;
  --accent: #7aa2f7;
  --green: #9ece6a;
  --red: #f7768e;
  --purple: #bb9af7;
  --yellow: #e0af68;
  --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--sans); font-size: 14px;
  display: flex; flex-direction: column; overflow: hidden;
}

/* ---------------- header ---------------- */
header {
  display: flex; align-items: center; gap: 14px;
  padding: 0 16px; height: 52px; flex: none;
  background: var(--panel); border-bottom: 1px solid var(--border);
}
.logo { font-family: var(--mono); font-weight: 700; font-size: 17px; white-space: nowrap; }
.logo .p { color: var(--green); }
.logo .jj { color: var(--purple); }
#levelName {
  font-family: var(--mono); font-size: 12.5px; color: var(--dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
header .btns { display: flex; gap: 8px; }
button {
  font-family: var(--sans); font-size: 12.5px; cursor: pointer;
  background: var(--panel2); color: var(--text);
  border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px;
}
button:hover { border-color: var(--accent); color: var(--accent); }

/* ---------------- layout ---------------- */
main { flex: 1; display: flex; min-height: 0; }

#terminal {
  width: 30%; min-width: 300px; max-width: 440px;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border); background: var(--panel);
}
#objectiveBar {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  font-size: 12.5px; line-height: 1.45; background: var(--panel2);
}
#objectiveBar .objLabel { color: var(--yellow); font-weight: 600; margin-right: 6px; }
#filesBar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 7px 14px; border-bottom: 1px solid var(--border); background: var(--panel2);
}
#filesBar.hidden { display: none; }
.filesLabel {
  font-family: var(--mono); font-size: 10px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--yellow); flex: none;
}
#filesList { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.fileChip {
  font-family: var(--mono); font-size: 11px; padding: 2.5px 9px;
  border-radius: 6px; background: var(--panel); border: 1px solid var(--border);
  color: var(--accent); cursor: pointer;
}
.fileChip:hover { border-color: var(--accent); }
.fileChip.conflict { color: var(--red); border-color: color-mix(in srgb, var(--red) 60%, var(--border)); }
.fileEmpty { color: var(--dim); font-size: 11px; font-style: italic; }

#termOut {
  flex: 1; overflow-y: auto; padding: 10px 14px;
  font-family: var(--mono); font-size: 12.5px; line-height: 1.55;
}
.tline { white-space: pre-wrap; word-break: break-word; }
.t-cmd { color: var(--accent); font-weight: 600; margin-top: 6px; }
.t-cmd2 { color: var(--accent); }
.t-err { color: var(--red); }
.t-ok { color: var(--green); }
.t-dim { color: var(--dim); }
#termInputRow {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border-top: 1px solid var(--border);
}
#termInputRow .prompt { font-family: var(--mono); color: var(--green); font-weight: 700; }
#termInput {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--mono); font-size: 13px; caret-color: var(--green);
}

/* ---------------- graph area ---------------- */
#graphArea { flex: 1; display: flex; min-width: 0; position: relative; }
#graphPane { flex: 1; min-width: 0; position: relative; }
#mainGraph, #goalGraph { width: 100%; height: 100%; display: block; }

#winBanner {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  background: color-mix(in srgb, var(--green) 18%, var(--panel));
  border: 1px solid var(--green); color: var(--green);
  padding: 6px 16px; border-radius: 999px; font-weight: 600; font-size: 13px;
  pointer-events: none;
}

#goalPane {
  width: 280px; flex: none; display: flex; flex-direction: column;
  border-left: 1px solid var(--border); background: var(--panel);
  transition: width .25s ease;
}
#goalPane.collapsed { width: 0; overflow: hidden; border-left: none; }
#goalPane h2 {
  font-size: 12px; text-transform: uppercase; letter-spacing: .12em;
  color: var(--yellow); padding: 12px 14px 8px; font-weight: 700;
}
#goalGraph { flex: 1; }
#goalPane .goalNote { padding: 10px 14px; font-size: 11.5px; color: var(--dim); line-height: 1.5; }
body.sandbox #goalPane { display: none; }

/* ---------------- svg graph ---------------- */
.edge { fill: none; stroke: #3b4261; stroke-width: 2; }
.nodeCircle.described { fill: #1c2534; stroke: var(--accent); stroke-width: 2; }
.nodeCircle.empty { fill: rgba(255,255,255,0.02); stroke: var(--dim); stroke-width: 1.6; stroke-dasharray: 4 4; }
.nodeRoot { fill: #1a1f2e; stroke: #414868; stroke-width: 2; }
.nodeRootText { fill: var(--dim) !important; font-size: 9px !important; }
.nodeDescText { fill: var(--text); font-size: 11px; font-weight: 600; font-family: var(--sans); }
.nodeEmptyText { fill: var(--dim); font-size: 8px; font-style: italic; font-family: var(--sans); }
.nodeId { font-family: var(--mono); font-size: 9.5px; }
.nodeIdHi { fill: var(--purple); font-weight: 700; }
.nodeIdLo { fill: #4c5578; }
.wcRing { fill: none; stroke: var(--green); stroke-width: 2; opacity: .85; }
.wcBadgeBg { fill: var(--green); }
.wcBadgeText { fill: #0d1017; font-weight: 800; font-size: 13px; font-family: var(--mono); }
.bookmarkChip rect { fill: color-mix(in srgb, var(--purple) 22%, var(--panel)); stroke: var(--purple); stroke-width: 1; }
.bookmarkChip text { fill: var(--purple); font-size: 10.5px; font-family: var(--mono); font-weight: 600; }
.remoteChip rect { fill: color-mix(in srgb, #73daca 16%, var(--panel)); stroke: #73daca; stroke-width: 1; }
.remoteChip text { fill: #73daca; font-size: 10px; font-family: var(--mono); font-weight: 600; }
.remoteChip.stale rect { stroke-dasharray: 3 3; opacity: .75; }
.remoteChip.stale text { opacity: .75; }
.nodeCircle.conflicted { stroke: var(--red) !important; }
.nodeCircle.immutable { stroke: #565f89; }
.conflictBadge circle { fill: var(--red); }
.conflictBadge text { fill: #0d1017; font-weight: 800; font-size: 13px; }
.immuMark { fill: #565f89; font-size: 9px; }
.nodeIdHi.divergent { fill: var(--red); }
.divergentMark { fill: var(--red); font-weight: 700; }
.bookmarkChip.conflicted rect { stroke: var(--red); fill: color-mix(in srgb, var(--red) 14%, var(--panel)); }
.bookmarkChip.conflicted text { fill: var(--red); }

/* ---------------- modals ---------------- */
.overlay {
  position: fixed; inset: 0; background: rgba(5, 7, 12, .72);
  display: flex; align-items: center; justify-content: center; z-index: 40;
}
.overlay.hidden, .hidden { display: none; }
.modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
  width: min(620px, calc(100vw - 40px)); max-height: calc(100vh - 80px);
  display: flex; flex-direction: column; box-shadow: 0 24px 70px rgba(0,0,0,.55);
}
.modalHead {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 0;
}
.modalHead h2 { font-size: 17px; }
.modalClose { border: none; background: none; color: var(--dim); font-size: 18px; padding: 4px 8px; }
.modalBody { padding: 14px 20px 20px; overflow-y: auto; line-height: 1.6; font-size: 13.5px; }
.modalBody p + p, .modalBody p + ul, .modalBody ul + p { margin-top: 10px; }
.modalBody ul { padding-left: 20px; }
.modalBody code {
  font-family: var(--mono); font-size: 12px; background: var(--panel2);
  border: 1px solid var(--border); border-radius: 5px; padding: 1.5px 5px; color: var(--accent);
}
.modalBody a { color: var(--accent); }
.cardNote { color: var(--dim); font-size: 12.5px; }
.modalFoot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px 18px; border-top: 1px solid var(--border);
}
#introDots { color: var(--dim); font-size: 11px; letter-spacing: .3em; }

/* win modal */
#winModal .modal { width: min(430px, calc(100vw - 40px)); text-align: center; }
#winModal .modalBody { padding-top: 22px; }
.winEmoji { font-size: 44px; }
#winModal h2 { margin: 8px 0 6px; font-size: 20px; color: var(--green); }
#winStats { color: var(--dim); }
#winModal .modalFoot { justify-content: center; gap: 10px; border-top: none; padding-top: 4px; }
#winNext { background: var(--green); color: #0d1017; border-color: var(--green); font-weight: 700; }
#winNext:hover { color: #0d1017; filter: brightness(1.1); }

/* level select */
#levelsModal .modal { width: min(720px, calc(100vw - 40px)); }
.seqHeader { margin: 14px 0 8px; }
.seqTitle { font-weight: 700; font-size: 14.5px; color: var(--yellow); }
.seqBlurb { color: var(--dim); font-size: 12px; margin-top: 2px; }
.levelGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; }
.levelCard {
  display: flex; align-items: center; gap: 10px; text-align: left;
  padding: 10px 12px; border-radius: 9px;
}
.levelCard .lvNum {
  font-family: var(--mono); color: var(--dim); font-size: 12px;
  width: 20px; text-align: right; flex: none;
}
.levelCard .lvTitle { flex: 1; font-size: 12.5px; }
.levelCard .lvCheck { color: var(--green); font-weight: 700; }
.levelCard.solved { border-color: color-mix(in srgb, var(--green) 45%, var(--border)); }
.sandboxCard { margin-top: 14px; width: 100%; }
.creditLine { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 11.5px; color: var(--dim); text-align: center; }
.creditLine a { color: var(--accent); text-decoration: none; }
.creditLine a:hover { text-decoration: underline; }

/* ---------------- narrow screens ---------------- */
@media (max-width: 760px) {
  main { flex-direction: column; }
  #terminal { width: 100%; max-width: none; height: 45%; border-right: none; border-top: 1px solid var(--border); order: 2; }
  #graphArea { order: 1; }
  #goalPane { position: absolute; right: 0; top: 0; bottom: 0; z-index: 5; }
  header { gap: 8px; padding: 0 10px; }
  .logo { font-size: 14px; }
}

/* host-page embedding: the app owns the viewport */
html, body { height: 100%; margin: 0; padding: 0; }
</style>


<header>
  <div class="logo"><span class="p">$</span> learn <span class="jj">jj</span></div>
  <div id="levelName"></div>
  <div class="btns">
    <button id="btnLevels">Levels</button>
    <button id="btnIntroAgain" title="Re-read this level's intro">Intro</button>
    <button id="btnHint">Hint</button>
    <button id="btnReset">Reset</button>
    <button id="btnGoalToggle" title="Show / hide the goal">Goal</button>
    <button id="btnHelp">Help</button>
  </div>
</header>

<main>
  <section id="terminal">
    <div id="objectiveBar"><span class="objLabel">Objective</span><span id="objectiveText"></span></div>
    <div id="filesBar" class="hidden"><span class="filesLabel">working dir</span><div id="filesList"></div></div>
    <div id="termOut"></div>
    <div id="termInputRow">
      <span class="prompt">$</span>
      <input id="termInput" autocomplete="off" spellcheck="false" placeholder="jj …" autofocus>
    </div>
  </section>

  <section id="graphArea">
    <div id="graphPane">
      <svg id="mainGraph" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="winBanner" class="hidden">✓ Level solved!</div>
    </div>
    <aside id="goalPane">
      <h2>Goal</h2>
      <svg id="goalGraph" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="goalNote">Match this shape — descriptions, bookmarks, and where <b>@</b> ends up.
        Change IDs of nodes you create may differ.</div>
    </aside>
  </section>
</main>

<div id="introModal" class="overlay hidden">
  <div class="modal">
    <div class="modalHead"><h2 id="introTitle"></h2><button class="modalClose">✕</button></div>
    <div class="modalBody" id="introBody"></div>
    <div class="modalFoot">
      <button id="introPrev">◂ Back</button>
      <span id="introDots"></span>
      <button id="introNext">Next ▸</button>
